name: CI Blog OPA

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
    - run: npm ci
    - run: npx tsc --noEmit
    - run: npm run lint
    - run: npm run build

# Deploy: Vercel auto-deploys on push to main (connect repo in vercel.com)
# No manual deploy step needed — Vercel handles build + CDN + SSL
